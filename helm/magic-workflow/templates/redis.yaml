apiVersion: v1
kind: Service
metadata:
  name: {{ include "mw.fullname" . }}-redis
  labels:
    {{- include "mw.labels" . | nindent 4 }}
    {{- include "mw.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
  selector:
    {{- include "mw.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
{{- if .Values.redis.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mw.fullname" . }}-redis
  labels:
    {{- include "mw.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.redis.persistence.size }} } }
  {{- $sc := .Values.redis.persistence.storageClass | default .Values.global.storageClass }}
  {{- if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mw.fullname" . }}-redis
  labels:
    {{- include "mw.labels" . | nindent 4 }}
    {{- include "mw.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      {{- include "mw.componentLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mw.componentLabels" (dict "root" . "component" "redis") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mw.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "mw.podSecurityContext" . | nindent 6 }}
      containers:
        - name: redis
          image: {{ include "mw.image" (dict "root" . "image" .Values.redis.image) }}
          imagePullPolicy: {{ include "mw.imagePullPolicy" (dict "root" .) }}
          # No password: Redis is reachable only inside the namespace.
          args: ["redis-server", "--save", "60", "1"]
          ports:
            - { name: redis, containerPort: 6379 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "mw.fullname" . }}-redis }
          {{- else }}
          emptyDir: {}
          {{- end }}
