apiVersion: v1
kind: Service
metadata:
  name: {{ include "mw.fullname" . }}-collabora
  labels:
    {{- include "mw.labels" . | nindent 4 }}
    {{- include "mw.componentLabels" (dict "root" . "component" "collabora") | nindent 4 }}
spec:
  ports:
    - { name: http, port: 9980, targetPort: 9980 }
  selector:
    {{- include "mw.componentLabels" (dict "root" . "component" "collabora") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mw.fullname" . }}-collabora
  labels:
    {{- include "mw.labels" . | nindent 4 }}
    {{- include "mw.componentLabels" (dict "root" . "component" "collabora") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mw.componentLabels" (dict "root" . "component" "collabora") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mw.componentLabels" (dict "root" . "component" "collabora") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mw.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "mw.podSecurityContext" . | nindent 6 }}
      containers:
        - name: collabora
          image: {{ include "mw.image" (dict "root" . "image" .Values.collabora.image) }}
          imagePullPolicy: {{ include "mw.imagePullPolicy" (dict "root" .) }}
          # Collabora needs MKNOD to set up its per-document jails.
          securityContext:
            capabilities:
              add: ["MKNOD"]
          env:
            - { name: TZ, value: {{ .Values.timezone | quote }} }
            - { name: aliasgroup1, value: "https://{{ .Values.hosts.nextcloud }}:443" }
            - name: username
              valueFrom: { secretKeyRef: { name: {{ include "mw.secretName" . }}, key: COLLABORA_USERNAME } }
            - name: password
              valueFrom: { secretKeyRef: { name: {{ include "mw.secretName" . }}, key: COLLABORA_PASSWORD } }
            # TLS terminates at the Ingress; Collabora speaks HTTP internally.
            - { name: extra_params, value: "--o:ssl.enable=false --o:ssl.termination=true --o:storage.ssl.enable=true" }
          ports:
            - { name: http, containerPort: 9980 }
          readinessProbe:
            tcpSocket: { port: 9980 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources: {{- toYaml .Values.collabora.resources | nindent 12 }}
