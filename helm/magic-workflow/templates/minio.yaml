apiVersion: v1
kind: Service
metadata:
  name: {{ include "mw.fullname" . }}-minio
  labels:
    {{- include "mw.labels" . | nindent 4 }}
    {{- include "mw.componentLabels" (dict "root" . "component" "minio") | nindent 4 }}
spec:
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
  selector:
    {{- include "mw.componentLabels" (dict "root" . "component" "minio") | nindent 4 }}
{{- if .Values.minio.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mw.fullname" . }}-minio
  labels:
    {{- include "mw.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: {{ .Values.minio.persistence.size }} } }
  {{- $sc := .Values.minio.persistence.storageClass | default .Values.global.storageClass }}
  {{- if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mw.fullname" . }}-minio
  labels:
    {{- include "mw.labels" . | nindent 4 }}
    {{- include "mw.componentLabels" (dict "root" . "component" "minio") | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      {{- include "mw.componentLabels" (dict "root" . "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mw.componentLabels" (dict "root" . "component" "minio") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mw.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "mw.podSecurityContext" . | nindent 6 }}
      containers:
        - name: minio
          image: {{ include "mw.image" (dict "root" . "image" .Values.minio.image) }}
          imagePullPolicy: {{ include "mw.imagePullPolicy" (dict "root" .) }}
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: TZ, value: {{ .Values.timezone | quote }} }
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: {{ include "mw.secretName" . }}, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "mw.secretName" . }}, key: MINIO_ROOT_PASSWORD } }
            - { name: MINIO_BROWSER_REDIRECT_URL, value: "https://{{ .Values.hosts.minioConsole }}" }
          ports:
            - { name: s3, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources: {{- toYaml .Values.minio.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.minio.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "mw.fullname" . }}-minio }
          {{- else }}
          emptyDir: {}
          {{- end }}
