{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mw.secretName" . }}
  labels:
    {{- include "mw.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_SUPER_USER: {{ .Values.secrets.postgresSuperUser | quote }}
  POSTGRES_SUPER_PASSWORD: {{ .Values.secrets.postgresSuperPassword | quote }}
  NEXTCLOUD_DB_PASSWORD: {{ .Values.secrets.nextcloudDbPassword | quote }}
  MATTERMOST_DB_PASSWORD: {{ .Values.secrets.mattermostDbPassword | quote }}
  KEYCLOAK_DB_PASSWORD: {{ .Values.secrets.keycloakDbPassword | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.minioRootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioRootPassword | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  KEYCLOAK_ADMIN: {{ .Values.secrets.keycloakAdmin | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloakAdminPassword | quote }}
  OIDC_NEXTCLOUD_SECRET: {{ .Values.secrets.oidcNextcloudSecret | quote }}
  OIDC_MATTERMOST_SECRET: {{ .Values.secrets.oidcMattermostSecret | quote }}
  NEXTCLOUD_ADMIN_USER: {{ .Values.secrets.nextcloudAdminUser | quote }}
  NEXTCLOUD_ADMIN_PASSWORD: {{ .Values.secrets.nextcloudAdminPassword | quote }}
  COLLABORA_USERNAME: {{ .Values.secrets.collaboraUsername | quote }}
  COLLABORA_PASSWORD: {{ .Values.secrets.collaboraPassword | quote }}
  GRAFANA_ADMIN_USER: {{ .Values.secrets.grafanaAdminUser | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
  # Pre-built Mattermost DSN (keeps the DB password out of plain env vars).
  MM_DATASOURCE: {{ printf "postgres://mattermost:%s@%s-postgres:5432/mattermost?sslmode=disable&connect_timeout=10" .Values.secrets.mattermostDbPassword (include "mw.fullname" .) | quote }}
{{- end }}
