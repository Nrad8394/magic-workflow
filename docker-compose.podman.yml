# =============================================================================
# Podman/RHEL overlay — applied automatically by `make up-full ENGINE=podman`
# (in place of docker-compose.ops.yml). Podman containers log to the systemd
# journal and there is no Docker socket, so:
#   * promtail is defined here as a standalone, journald-reading service
#     (NOT an override — the Docker promtail lives in docker-compose.ops.yml,
#     which Podman never loads, so there are no Docker-socket mounts to clash);
#   * watchtower is omitted — it's Docker-only. Use `podman auto-update` instead
#     (label containers io.containers.autoupdate=registry and enable the timer:
#      systemctl --user enable --now podman-auto-update.timer).
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  promtail:
    image: ${IMAGE_REGISTRY:-}grafana/promtail:${PROMTAIL_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./config/promtail/promtail-config.podman.yml:/etc/promtail/promtail-config.yml:ro,z
      # Persistent journal (created by install-rhel.sh). If this dir is missing,
      # enable persistent journald: sudo mkdir -p /var/log/journal && \
      #   sudo systemctl restart systemd-journald
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    networks: [internal]
# `internal` network is inherited from docker-compose.yml (always merged in).
