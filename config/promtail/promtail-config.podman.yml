server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Podman containers log to the systemd journal by default (no Docker socket /
  # /var/lib/docker/containers to scrape). Read the journal instead.
  - job_name: journal
    journal:
      max_age: 12h
      path: /var/log/journal
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal_container_name']
        target_label: container
      - source_labels: ['__journal_syslog_identifier']
        target_label: syslog_identifier
