# Magic Workflow — edge reverse proxy.
# Terminates TLS and routes by hostname to each backend service.
# Per-service vhosts live in conf.d/*.conf.

worker_processes auto;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    server_tokens off;
    types_hash_max_size 2048;

    # Large uploads (Nextcloud, Mattermost files)
    client_max_body_size 10G;
    client_body_timeout 300s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Preserve client info to backends
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket upgrade map (Mattermost, Collabora, Nextcloud notify_push)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Container DNS for variable proxy_pass (so the proxy still starts when an
    # optional upstream like grafana isn't running). The address differs per
    # engine — Docker uses 127.0.0.11, Podman/netavark uses the network gateway
    # — so it's generated from the container's resolv.conf at startup by
    # /docker-entrypoint.d/05-resolver.sh. Engine-agnostic.
    include /etc/nginx/resolver.conf;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Shared TLS settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Redirect all plain HTTP to HTTPS (ACME challenge handled per-vhost if needed)
    server {
        listen 80 default_server;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    include /etc/nginx/conf.d/*.conf;
}
