site_name: Magic Workflow Docs
docs_dir: docs
site_description: Production-ready self-hosted collaboration suite — Nextcloud, Mattermost, Collabora, Keycloak, MinIO
copyright: Copyright © Magic Workflow

strict: true

validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: relative_to_docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang: en
  - print-site:
      add_to_navigation: true
      print_page_title: 'Magic Workflow Docs'
      add_table_of_contents: true
      toc_title: 'Table of Contents'
      toc_depth: 3
      add_cover_page: true
      enabled: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Install locally: install-local.md
  - Install on a server: install-server.md
  - Install on RHEL (Podman): install-rhel.md
  - Single sign-on: sso.md
  - Storage (MinIO/S3): storage.md
  - Backups & restore: backups.md
  - Monitoring: monitoring.md
  - Operations: operations.md
  - Enterprise guide: enterprise.md
  - Kubernetes: kubernetes.md
  - Air-gapped / offline: air-gapped.md
  - Troubleshooting: troubleshooting.md
