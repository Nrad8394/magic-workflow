# Monitoring + ops overlay for Magic Workflow.
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# (the Makefile `up-full` target does this for you)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    networks: [internal]

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    depends_on: [prometheus, loki]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    networks: [internal]

  loki:
    image: grafana/loki:${LOKI_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks: [internal]

  promtail:
    image: grafana/promtail:${PROMTAIL_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [internal]

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      # Plain :ro (not rslave) — rslave needs the host '/' to be a shared/slave
      # mount, which fails on WSL2/Docker Desktop ("path / is not shared or slave").
      - /:/host:ro
    networks: [internal]

  # ── Ops ──────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:${WATCHTOWER_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"   # 04:00 daily; review before enabling auto-update in prod
      WATCHTOWER_LABEL_ENABLE: "true"       # only update containers opted-in via label
      # Pin the Docker API version — watchtower 1.7.1 negotiates v1.25, which
      # modern daemons (Docker 25+/API >= 1.40) reject. 1.44 is widely supported.
      DOCKER_API_VERSION: "1.44"
    networks: [internal]

  backup:
    image: postgres:${POSTGRES_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config/backup/backup.sh:/usr/local/bin/backup.sh:ro
      - backups:/backups
    environment:
      TZ: ${TZ}
      PGHOST: db
      PGUSER: ${POSTGRES_SUPER_USER}
      PGPASSWORD: ${POSTGRES_SUPER_PASSWORD}
      BACKUP_KEEP_DAYS: "14"
      BACKUP_INTERVAL_SECONDS: "86400"   # daily
    # Simple, dependency-free scheduler: back up on start, then every interval.
    entrypoint: ["/bin/bash", "-c", "while true; do /usr/local/bin/backup.sh; sleep \"$$BACKUP_INTERVAL_SECONDS\"; done"]
    networks: [internal]

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  backups:
