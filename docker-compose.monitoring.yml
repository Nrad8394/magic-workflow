# Monitoring + ops overlay for Magic Workflow.
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# (the Makefile `up-full` target does this for you)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  prometheus:
    image: ${IMAGE_REGISTRY:-}prom/prometheus:${PROMETHEUS_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    networks: [internal]

  grafana:
    image: ${IMAGE_REGISTRY:-}grafana/grafana:${GRAFANA_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    depends_on: [prometheus, loki]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro,z
    environment:
      TZ: ${TZ}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    networks: [internal]

  loki:
    image: ${IMAGE_REGISTRY:-}grafana/loki:${LOKI_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro,z
      - loki_data:/loki
    networks: [internal]

  # NOTE: promtail (log shipping) and watchtower (auto-update) are Docker-socket
  # bound, so they live in docker-compose.ops.yml (Docker only). On Podman the
  # Makefile substitutes docker-compose.podman.yml, which ships a journald-based
  # promtail instead. node-exporter + backup below work on both engines.
  node-exporter:
    image: ${IMAGE_REGISTRY:-}prom/node-exporter:${NODE_EXPORTER_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      # Plain :ro (not rslave) — rslave needs the host '/' to be a shared/slave
      # mount, which fails on WSL2/Docker Desktop ("path / is not shared or slave").
      - /:/host:ro
    networks: [internal]

  # ── Ops ──────────────────────────────────────────────────────────────────
  backup:
    image: ${IMAGE_REGISTRY:-}postgres:${POSTGRES_IMAGE_TAG}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config/backup/backup.sh:/usr/local/bin/backup.sh:ro,z
      - backups:/backups
    environment:
      TZ: ${TZ}
      PGHOST: db
      PGUSER: ${POSTGRES_SUPER_USER}
      PGPASSWORD: ${POSTGRES_SUPER_PASSWORD}
      BACKUP_KEEP_DAYS: "14"
      BACKUP_INTERVAL_SECONDS: "86400"   # daily
    # Simple, dependency-free scheduler: back up on start, then every interval.
    entrypoint: ["/bin/bash", "-c", "while true; do /usr/local/bin/backup.sh; sleep \"$$BACKUP_INTERVAL_SECONDS\"; done"]
    networks: [internal]

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  backups:
